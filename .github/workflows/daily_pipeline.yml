name: ApplyRyt Job Bot

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  apply:
    name: Find and apply to jobs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (for weasyprint PDF generation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libffi-dev libcairo2 libcairo2-dev

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run job application pipeline
        run: |
          python main.py
        env:
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD:      ${{ secrets.GMAIL_APP_PASSWORD }}
          GSHEET_CREDENTIALS_JSON: ${{ secrets.GSHEET_CREDENTIALS_JSON }}
          WORKDAY_PASSWORD:        ${{ secrets.WORKDAY_PASSWORD }}

      - name: Save state and generated resumes
        if: always()
        run: |
          git config user.name  "applyryt-bot"
          git config user.email "bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add logs/applied.json logs/daily_count.json \
                  logs/slug_cache.json logs/seen_jobs.json \
                  logs/applications.xlsx 2>/dev/null || true
          git add resumes/*.pdf 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "chore: update state + resumes [skip ci]"
          git push || true