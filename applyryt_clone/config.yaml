  email: "vimalteja.m@gmail.com"
  phone: "945-244-6925"
  linkedin: "https://www.linkedin.com/in/mv9t9"
  github: ""
  location: "Tampa, FL"
  visa_status: "F1 Visa - OPT/CPT"   # no sponsorship required for current role
  requires_sponsorship: false         # used directly for "do you need sponsorship?" questions

  # EEO / voluntary self-identification fields.
  # These questions are LEGALLY OPTIONAL on every US application.
  # The bot SKIPS these by default (selects "Decline to self-identify") because:
  #   - it has zero effect on hiring decisions by law
  #   - it's one less thing that can be answered inconsistently across forms
  # If you'd rather have them answered when a form requires a response,
  # set eeo_disclose: true and fill in the values below.
  eeo_disclose: true
  race_ethnicity: "Asian"
  gender: "Male"
  veteran_status: "I am not a veteran"
  disability_status: "No, I do not have a disability"

search:
  roles:                             # Add as many as you want
    - "Business Analyst"
    - "Business Transformation Analyst"
    - "Product Owner"
    - "Process Improvement Analyst"
  location: "Tampa, FL"              # anchor for Glassdoor/Indeed/LinkedIn; remote + nationwide jobs still included via is_remote and Google Jobs
  remote_only: false                 # true = remote jobs only
  min_fit_score: 4                    # apply if AI scores 4+/10 — cast wide net                   # 1–10; jobs below this are skipped
  daily_cap: 150                      # 150/day = 4,500/month (matches Tsenta Max plan)                      # max applications per day
  hours_old: 360                     # only scrape jobs posted in last 360 hours (15 days)
  blacklist_companies:               # never apply to these
    # Consulting / IT services / staffing — product companies only
    - "Capco"
    - "Infosys"
    - "Tata Consultancy"
    - "Wipro"
    - "HCL Technologies"
    - "Cognizant"
    - "Accenture"
    - "Capgemini"
    - "Deloitte"
    - "Booz Allen"
    - "Leidos"
    - "SAIC"
    - "DXC Technology"
    - "NTT Data"
    - "Apex Systems"
    - "Insight Global"
    - "Robert Half"
    - "Kforce"
    - "Modis"
  blacklist_keywords:                # skip jobs whose titles contain these
    - "Staff Augmentation"
    - "C2C"
    - "1099"

  # Used to answer common application form questions automatically:
  salary_expectation: "$100,000+"   # minimum acceptable; AI will frame as a range if form expects one
  notice_period: "2 weeks"
  willing_to_relocate: false

  # Company type filter
  # "product"  = only product-based companies (excludes consulting/staffing/outsourcing)
  # "any"      = all companies
  company_type: "product"
  # true  = skip companies with no H1B record (recommended for F1/OPT candidates)
  # false = apply to all companies regardless (if you don't need sponsorship now)
  h1b_filter: false  # Apply to ALL companies — never miss a job posting

ai:
  provider: "groq"                   # "groq" or "gemini"
  model: "llama-3.3-70b-versatile"  # Groq free model
  # model: "gemini-1.5-flash"        # Gemini free model
  temperature: 0.3
  max_tokens: 2000

ats_targets:
  # ─────────────────────────────────────────────────────────────────────────
  # HOW JOB DISCOVERY ACTUALLY WORKS — you do NOT need to add companies here
  # ─────────────────────────────────────────────────────────────────────────
  #
  # The bot finds jobs for your role across ALL US companies using 3 layers:
  #
  # LAYER 1 — Job boards (automatic, role-based search):
  #   Indeed      → searches all companies posting your role on Indeed
  #   Google Jobs → searches all companies posting your role via Google
  #   Glassdoor   → searches all companies posting your role on Glassdoor
  #
  # LAYER 2 — ATS direct APIs (automatic, role-filtered after fetching):
  #   Greenhouse  → 28 verified companies checked directly + Google SERP
  #                 discovers MORE companies every run as they post your role
  #   Lever       → 4 verified companies + Google SERP discovery
  #   Workday     → 22 major enterprises (Amazon, Microsoft, Apple, Salesforce,
  #                 Oracle, Cisco, Intuit, Adobe, PayPal, Uber, Meta, Verizon,
  #                 JPMC, Capital One, Wells Fargo, US Bank, T-Mobile, Target,
  #                 Walmart, Home Depot, Comcast, Nvidia) — filtered by role
  #
  # LAYER 3 — Slug cache (grows automatically over time):
  #   Every time a new company is discovered via job board URLs or SERP,
  #   its ATS slug is saved to logs/slug_cache.json and checked on future runs.
  #   The system learns new companies every single run.
  #
  # The company lists are managed in scrapers/discovery.py (ALWAYS_CHECK).
  # You never need to add companies here — the system finds them automatically.
  # ─────────────────────────────────────────────────────────────────────────

  jobboards:                         # job board sources for JobSpy
    sites:
      - "indeed"
      - "google"
      # Glassdoor handled via scrapers/glassdoor.py (direct Playwright scraper)
      # because JobSpy's Glassdoor module is broken (open issue #270)

tracking:
  sheet_name: "Job Applications"     # Google Sheet name
  notify_email: "vimalteja.m@gmail.com"  # email notifications sent here
  followup_days: 7                   # days before follow-up reminder

dry_run: false                      # SET TRUE to test without applying                        # ALWAYS start with true. Set false only after validation passes.

# Approve-before-send (like Tsenta's review queue)
# true  = fully hands-off, submits immediately (default once you trust the system)
# false = holds each application for your approval at localhost:8080
#         Run: python main.py --review  to see the review UI
auto_approve: true
